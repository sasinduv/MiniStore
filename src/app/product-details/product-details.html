<!--<h1>Product-Details</h1>-->
<div class="container" *ngIf="product">
  <div class="row">
    <div class="col-md-4">
      <img [src]="product?.image" alt="">
    </div>
    <div>

      <h2>{{product?.title}}</h2>
      <p class="text-muted">{{product?.category}}</p>
      <h3 class="text-success">{{product?.price}}</h3>
    </div>
  </div>
</div>
